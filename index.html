<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Discover my amazing dream job as a Software Engineer! Learn what we do, why it's fun, and how to become one.">
    <title>My Dream Job | ✨ Software Engineer ✨</title>
    <!-- Bubbly, friendly font from Google Fonts -->
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <!-- Fun floating emojis in the background -->
    <div class="background-effects">
        <div class="floating-emoji e-1">🚀</div>
        <div class="floating-emoji e-2">💻</div>
        <div class="floating-emoji e-3">🦖</div>
        <div class="floating-emoji e-4">🎨</div>
        <div class="floating-emoji e-5">🦄</div>
    </div>

    <main class="container">
        <header>
            <div class="badge">🚀 Super Cool Job!</div>
            <h1>My Dream Job <br><span class="gradient-text">Software Engineer 👨‍💻</span></h1>
            <p class="subtitle">Exploring the world of coding, building fun stuff, and problem-solving like a ninja! 🥷
            </p>
        </header>

        <section class="cards-grid">
            <!-- Card 1 -->
            <article class="card" id="card1">
                <div class="card-content">
                    <div class="icon-wrapper">
                        🛠️
                    </div>
                    <h2>The Role</h2>
                    <p class="question" id="text1">What do I do?</p>
                </div>
                <div class="card-actions">
                    <button class="btn btn-primary" onclick="toggleText(1, true)">Reveal Magic! ✨</button>
                    <button class="btn btn-secondary" onclick="toggleText(1, false)">Oops, Go Back! 🔙</button>
                </div>
            </article>

            <!-- Card 2 -->
            <article class="card" id="card2">
                <div class="card-content">
                    <div class="icon-wrapper">
                        🎮
                    </div>
                    <h2>The Passion</h2>
                    <p class="question" id="text2">Why is it fun?</p>
                </div>
                <div class="card-actions">
                    <button class="btn btn-primary" onclick="toggleText(2, true)">Reveal Magic! ✨</button>
                    <button class="btn btn-secondary" onclick="toggleText(2, false)">Oops, Go Back! 🔙</button>
                </div>
            </article>

            <!-- Card 3 -->
            <article class="card" id="card3">
                <div class="card-content">
                    <div class="icon-wrapper">
                        🌟
                    </div>
                    <h2>The Path</h2>
                    <p class="question" id="text3">How can you become one?</p>
                </div>
                <div class="card-actions">
                    <button class="btn btn-primary" onclick="toggleText(3, true)">Reveal Magic! ✨</button>
                    <button class="btn btn-secondary" onclick="toggleText(3, false)">Oops, Go Back! 🔙</button>
                </div>
            </article>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
